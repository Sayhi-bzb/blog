{%- assign page_lang = page.lang | default: site.lang | default: "en" -%}
{%- assign i18n = site.data.i18n[page_lang] | default: site.data.i18n.en -%}
<footer class="site-footer" aria-label="{{ i18n.footer | default: "Footer" }}">
  <div class="w">
    <hr data-content="" />

    <div class="site-footer__inner small muted">
      <p class="site-footer__copyright">
        &copy; {{ site.time | date: "%Y" }} {{ site.author }}
      </p>

      <nav class="site-footer__links" aria-label="{{ i18n.footer | default: "Footer" }}">
        {%-include language_switch.html-%}
        <a class="site-footer__icon-link" href="mailto:hi@h3nryh3.com" aria-label="Email" title="Email">
          <img class="site-footer__icon" src="{{ "/assets/icons/Envelope.svg" | relative_url }}" alt="" aria-hidden="true" />
        </a>
        <a class="site-footer__icon-link" href="{{ "/feed.xml" | relative_url }}" aria-label="RSS" title="RSS">
          <img class="site-footer__icon" src="{{ "/assets/icons/RSS.svg" | relative_url }}" alt="" aria-hidden="true" />
        </a>
        <a class="site-footer__icon-link" href="https://github.com/Sayhi-bzb" aria-label="GitHub" title="GitHub">
          <img class="site-footer__icon" src="{{ "/assets/icons/Github.svg" | relative_url }}" alt="" aria-hidden="true" />
        </a>
      </nav>
    </div>
  </div>
</footer>
