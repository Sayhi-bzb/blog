title: Your Blog
author: Henry He
email: you@example.com
lang: zh-CN
url: https://h3nryh3.com
baseurl: ""
description: >-
  记录写作、代码和缓慢搭起来的个人空间。

permalink: /:slug/
timezone: Asia/Shanghai
favicon: "/assets/logo.svg"
katex: false
# goat_counter: "yoursitename"

theme_config:
  appearance: "auto"
  back_home_text: "首页"
  date_format: "%Y-%m-%d"
  show_description: true
  lowercase_titles: false
  home_post_limit: 5

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - .agents/
  - .claude/
  - AGENTS.md
  - CLAUDE.md
  - DESIGN.md
  - scripts/
  - skills-lock.json
  - writing/

sass:
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag
