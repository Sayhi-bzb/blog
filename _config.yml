title: Your Blog
author: Henry He
email: you@example.com
lang: en
url: https://h3nryh3.com
baseurl: ""
description: >-
  Notes on writing, code, and a personal space slowly taking shape.
twitter:
  card: summary_large_image

permalink: /:slug/
timezone: Asia/Shanghai
favicon: "/assets/logo.svg"
katex: false
# goat_counter: "yoursitename"

theme_config:
  appearance: "auto"
  date_format: "%Y-%m-%d"
  show_description: true
  lowercase_titles: false
  home_post_limit: 5

defaults:
  - scope:
      path: ""
    values:
      image:
        path: /assets/og-default.jpg
        width: 3104
        height: 1552
        alt: Blog preview image
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      lang: en
      permalink: /:slug/
  - scope:
      path: "_posts/zh"
      type: posts
    values:
      layout: post
      lang: zh-CN
      permalink: /zh/:slug/

exclude:
  - .agents/
  - .claude/
  - AGENTS.md
  - CLAUDE.md
  - DESIGN.md
  - README.md
  - assets/fonts/LICENSE
  - assets/fonts/README.md
  - scripts/
  - skills-lock.json
  - writing/

sass:
  style: compressed
  sourcemap: never

plugins:
  - jekyll-feed
  - jekyll-seo-tag
